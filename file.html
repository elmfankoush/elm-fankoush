<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, increment, update, onValue }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDd7b7SRTKdImQn18TQXVXQsvw_2XLvsPc",
    authDomain: "elm-58314.firebaseapp.com",
    projectId: "elm-58314",
    storageBucket: "elm-58314.firebasestorage.app",
    messagingSenderId: "862266082474",
    appId: "1:862266082474:web:7d1c436a78e37f3e3d7cd3",
    databaseURL: "https://elm-58314-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  /* ── helpers ── */
  function _setW(id, v){ const e=document.getElementById(id); if(e) e.style.width=v; }
  function _setT(id, v){ const e=document.getElementById(id); if(e) e.textContent=v; }

  function _renderVotes(prefix, elmV, fanV){
    const tot  = elmV + fanV || 1;
    const pE   = Math.round(elmV / tot * 100);
    const pF   = 100 - pE;
    _setW(prefix+'barElm', pE+'%');
    _setW(prefix+'barFan', pF+'%');
    _setT(prefix+'pctElm', pE+'%');
    _setT(prefix+'pctFan', pF+'%');
    _setT(prefix+'total',  `إجمالي الأصوات: ${(elmV+fanV).toLocaleString('ar-EG')} مشارك`);
  }

  function _barsHTML(prefix){
    return `
      <div class="vote-results-wrap">
        <div class="poll-bar-row">
          <span class="poll-bar-label elm-lbl">🔬 علم</span>
          <div class="poll-track">
            <div class="poll-fill fill-elm" id="${prefix}barElm" style="width:0%"></div>
          </div>
          <span class="poll-pct" id="${prefix}pctElm">-</span>
        </div>
        <div class="poll-bar-row">
          <span class="poll-bar-label fan-lbl">🔮 فنكوش</span>
          <div class="poll-track">
            <div class="poll-fill fill-fan" id="${prefix}barFan" style="width:0%"></div>
          </div>
          <span class="poll-pct" id="${prefix}pctFan">-</span>
        </div>
        <p class="poll-total" id="${prefix}total"></p>
      </div>`;
  }

  /* ════════════════════════════════════════
     1) تصويت من زراري الأول + عرض نتائج لحظية
     ════════════════════════════════════════ */
  window.castChoiceVoteAndShow = function(epNum, choice, onContinue){
    const key = `voted_ep${epNum}`;

    /* سجّل الصوت لو ما صوتش قبل */
    if(!localStorage.getItem(key)){
      localStorage.setItem(key, choice);
      update(ref(db, `votes/ep${epNum}`), { [choice]: increment(1) });
    }

    /* غيّر محتوى overlayBtns للنتائج */
    const btnsEl = document.getElementById('overlayBtns');
    const hintEl = document.getElementById('overlayHint');
    hintEl.textContent = 'رأي المشاهدين 📊';
    btnsEl.innerHTML   = _barsHTML('cv-');

    /* استمع للتحديثات */
    const unsub = onValue(ref(db, `votes/ep${epNum}`), snap => {
      const d = snap.val() || {};
      _renderVotes('cv-', d.elm||0, d.fankoush||0);
    });

    /* بعد 2.5 ثانية كمّل للمسار */
    setTimeout(() => { unsub(); if(onContinue) onContinue(); }, 2500);
  };

  /* ════════════════════════════════════════
     2) إعداد overlay النهاية (مربعين + نتائج)
     ════════════════════════════════════════ */
  let _endUnsub = null;

  window.setupEndingVote = function(epNum, btnsEl, hintEl){
    const key = `voted_ep${epNum}`;

    /* عرض النتائج (مع استماع live) */
    function showResults(){
      hintEl.textContent = 'نتائج تصويت المشاهدين 📊';
      btnsEl.innerHTML   = _barsHTML('ev-');
      if(_endUnsub){ _endUnsub(); _endUnsub=null; }
      _endUnsub = onValue(ref(db, `votes/ep${epNum}`), snap => {
        const d = snap.val() || {};
        _renderVotes('ev-', d.elm||0, d.fankoush||0);
      });
    }

    /* لو صوّت قبل كده اعرض النتائج مباشرة */
    if(localStorage.getItem(key)){
      showResults();
      return;
    }

    /* لسه ما صوتش → اعرض المربعين */
    btnsEl.innerHTML = `
      <div class="overlay-btns-choice">
        <button class="ov-btn elm" id="ev-btn-elm" onclick="event.stopPropagation()">🔬 علم</button>
        <button class="ov-btn fan" id="ev-btn-fan" onclick="event.stopPropagation()">🔮 فنكوش</button>
      </div>`;

    function castAndShow(choice){
      if(!localStorage.getItem(key)){
        localStorage.setItem(key, choice);
        update(ref(db, `votes/ep${epNum}`), { [choice]: increment(1) });
      }
      showResults();
    }

    /* نربط الأحداث بعد ما يتضاف الـ DOM */
    requestAnimationFrame(() => {
      const bE = document.getElementById('ev-btn-elm');
      const bF = document.getElementById('ev-btn-fan');
      if(bE) bE.addEventListener('click', e => { e.stopPropagation(); castAndShow('elm'); });
      if(bF) bF.addEventListener('click', e => { e.stopPropagation(); castAndShow('fankoush'); });
    });
  };

  /* ════════════════════════════════════════
     3) الـ poll overlay القديم (للـ fallback)
     ════════════════════════════════════════ */
  let _legacyUnsub = null;

  window.showPoll = function(epNum){
    const overlay = document.getElementById('pollOverlay');
    const key     = `voted_ep${epNum}`;
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    if(_legacyUnsub){ _legacyUnsub(); _legacyUnsub=null; }

    if(localStorage.getItem(key)){
      document.getElementById('pollBtns').style.display    = 'none';
      document.getElementById('pollResults').style.display = 'block';
      _startLegacyListen(epNum);
    } else {
      document.getElementById('pollBtns').style.display    = 'flex';
      document.getElementById('pollResults').style.display = 'none';
      document.getElementById('barElm').style.width      = '0%';
      document.getElementById('barFankoush').style.width = '0%';
      document.getElementById('pctElm').textContent      = '0%';
      document.getElementById('pctFankoush').textContent = '0%';
    }
  };

  window.castVote = function(choice){
    const epNum = window._currentEpNum;
    const key   = `voted_ep${epNum}`;
    if(!epNum || localStorage.getItem(key)) return;
    localStorage.setItem(key, choice);
    update(ref(db, `votes/ep${epNum}`), { [choice]: increment(1) });
    document.getElementById('pollBtns').style.display    = 'none';
    document.getElementById('pollResults').style.display = 'block';
    _startLegacyListen(epNum);
  };

  function _startLegacyListen(epNum){
    _legacyUnsub = onValue(ref(db, `votes/ep${epNum}`), snap => {
      const d   = snap.val() || {};
      const elm = d.elm      || 0;
      const fan = d.fankoush || 0;
      const tot = elm + fan  || 1;
      const pE  = Math.round(elm / tot * 100);
      const pF  = 100 - pE;
      document.getElementById('barElm').style.width      = pE+'%';
      document.getElementById('barFankoush').style.width = pF+'%';
      document.getElementById('pctElm').textContent      = pE+'%';
      document.getElementById('pctFankoush').textContent = pF+'%';
      document.getElementById('pollTotal').textContent   =
        `إجمالي الأصوات: ${(elm+fan).toLocaleString('ar-EG')} مشارك`;
    });
  }

  window.closePoll = function(){
    document.getElementById('pollOverlay').style.display = 'none';
    document.body.style.overflow = '';
    if(_legacyUnsub){ _legacyUnsub(); _legacyUnsub=null; }
  };
</script>
